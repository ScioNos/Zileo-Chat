# =============================================================================
# BACKEND TOOLS (LLM-facing tools in tool registry)
# =============================================================================
backend_tools:
  - { name: FileManagerTool, path: src-tauri/src/tools/file_manager/tool.rs, description: "Sandboxed filesystem ops (10 operations) restricted to agent authorized folders. Trash-based deletion, overwrite backups." }
  - { name: ReadSkillTool, path: src-tauri/src/tools/read_skill.rs, hidden: true, description: "Auto-injected when agent has skills. LLM reads skill content by name. Hidden from frontend UI." }
  - { name: DelegateTaskTool, path: src-tauri/src/tools/delegate_task.rs, description: "Delegates sub-tasks to other agents" }
  - { name: SpawnAgentTool, path: src-tauri/src/tools/spawn_agent.rs, description: "Spawns a new agent for parallel execution" }
  - { name: ReadMemoryTool, path: src-tauri/src/tools/read_memory.rs, description: "Reads memories from semantic memory store" }
  - { name: WriteMemoryTool, path: src-tauri/src/tools/write_memory.rs, description: "Writes memories to semantic memory store" }
  - { name: TodoTool, path: src-tauri/src/tools/todo/tool.rs, description: "Task management for multi-step workflows" }
  - { name: UserQuestionTool, path: src-tauri/src/tools/user_question/tool.rs, description: "Asks user questions during agent execution" }

# =============================================================================
# TAURI EVENTS (frontend listeners)
# =============================================================================
events:
  menu_events:
    description: "Events emitted by native menus, listened in +layout.svelte"
    events:
      - { name: open-legal-notice, source: "Help menu", handler: "+layout.svelte", action: "Opens LegalModal with type='legal-notice'" }
      - { name: open-privacy-policy, source: "Help menu", handler: "+layout.svelte", action: "Opens LegalModal with type='privacy-policy'" }

  workflow_events:
    description: "Events for workflow streaming and updates"
    events:
      - { name: "workflow:{id}", source: "streaming.rs", handler: "streamingStore", action: "Stream chunks during workflow execution" }
      - { name: validation_required, source: "validation.rs", handler: "validationStore", action: "Trigger validation modal" }

