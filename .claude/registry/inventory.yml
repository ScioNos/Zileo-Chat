# =============================================================================
# SVELTE STORES
# =============================================================================
stores:
  crud_stores:
    - name: agentStore
      path: src/lib/stores/agents.ts
      exports: [agentStore, agents, selectedAgent, isLoading, error, formMode, editingAgent]
      invokes: [list_agents, get_agent_config, create_agent, update_agent, delete_agent]
      removed_exports: [agentCount, AgentState, createInitialAgentState]

    - name: promptStore
      path: src/lib/stores/prompts.ts
      exports: [promptStore, prompts, selectedPromptId, promptLoading, promptFormMode, extractVariables, extractSkillReferences, interpolateVariables, getMissingVariables]
      invokes: [list_prompts, get_prompt, create_prompt, update_prompt, delete_prompt]
      removed_exports: [promptCount]

    - name: skillStore
      path: src/lib/stores/skills.ts
      exports: [skillStore, skills, selectedSkillId, skillLoading, skillError, skillFormMode, editingSkill, hasSkills, skillCount, enabledSkills]
      invokes: [list_skills, get_skill, create_skill, update_skill, delete_skill]

  workflow_stores:
    - name: workflowStore
      path: src/lib/stores/workflows.ts
      exports: [workflowStore, workflows, selectedWorkflowId, workflowsLoading, workflowsError, workflowSearchFilter, selectedWorkflow, filteredWorkflows, statusFilter, statusCounts, pinnedWorkflows]
      invokes: [load_workflows, delete_workflows_batch, move_workflow_to_folder, move_workflows_to_folder, toggle_workflow_pinned]

    - name: folderStore
      path: src/lib/stores/folders.ts
      exports: [folderStore, folders, foldersLoading, expandedFolderIds]
      invokes: [list_workflow_folders, create_workflow_folder, rename_workflow_folder, update_folder_color, delete_workflow_folder, reorder_workflow_folders]

    # activityStore removed (activity sidebar deleted)

    - name: streamingStore
      path: src/lib/stores/streaming.ts
      exports: [streamingStore, isStreaming, streamContent, activeTools, reasoningSteps]
      events: [workflow_stream, workflow_complete]

    - name: tokenStore
      path: src/lib/stores/tokens.ts
      exports: [tokenStore, tokenDisplayData, streamingTokens, cumulativeTokens]
      removed_exports: [isTokenStreaming]

  store_utils:
    - name: chunkProcessor
      path: src/lib/stores/utils/chunkProcessor.ts
      exports: [applyChunkToState, ChunkableState]
      description: "Shared chunk-to-state-delta processor used by streamingStore and backgroundWorkflowsStore"

  execution_stores:
    - name: executionBlocksStore
      path: src/lib/stores/execution-blocks.ts
      exports: [executionBlocksStore, executionBlocks, isExecuting, spinnerContext, executionResponse, executionError, executionCancelled, executionWorkflowId]
      description: "SA-019/P3: Block-by-block execution display state (thinking, tool_call, sub_agent blocks)"

  background_stores:
    - name: backgroundWorkflowsStore
      path: src/lib/stores/background-workflows.ts
      exports: [backgroundWorkflowsStore, runningWorkflows, recentlyCompletedWorkflows, runningCount, canStartNew, viewedExecution, runningWorkflowIds, recentlyCompletedIds, questionPendingIds]
      events: [workflow_stream, workflow_complete]
      description: "Central event dispatch for concurrent background workflow executions"

    - name: toastStore
      path: src/lib/stores/toast.ts
      exports: [toastStore, toasts, visibleToasts, hasToasts, navigationTarget]
      description: "Toast notification store for background workflow events"

  interaction_stores:
    - name: userQuestionStore
      path: src/lib/stores/user-question.ts
      exports: [userQuestionStore, pendingQuestions, currentQuestion, isModalOpen]
      invokes: [submit_user_response, skip_question]

    - name: validationStore
      path: src/lib/stores/validation.ts
      exports: [validationStore, hasPendingValidation, pendingValidation, isValidating]
      invokes: [approve_validation, reject_validation]
      events: [validation_required]

    - name: validationSettingsStore
      path: src/lib/stores/validation-settings.ts
      exports: [validationSettingsStore, settings, isLoading, isSaving]
      invokes: [get_validation_settings, update_validation_settings]

  config_stores:
    - name: llmStore
      path: src/lib/stores/llm.ts
      type: pure_functions
      exports: [loadModels, createModel, updateModel, deleteModel, loadProviderSettings, testConnection, listProviders, createCustomProvider, updateCustomProvider, deleteCustomProvider, loadAllLLMData]
      invokes: [list_models, get_model, create_model, update_model, delete_model, get_provider_settings, update_provider_settings, test_provider_connection, list_providers, create_custom_provider, update_custom_provider, delete_custom_provider]

    - name: mcpStore
      path: src/lib/stores/mcp.ts
      type: pure_functions
      exports: [loadServers, createServer, updateServerConfig, deleteServer, testServer, startServer, stopServer]
      invokes: [list_mcp_servers, create_mcp_server, update_mcp_server, delete_mcp_server, test_mcp_server, start_mcp_server, stop_mcp_server]

  ui_stores:
    - name: theme
      path: src/lib/stores/theme.ts
      exports: [theme]
      persistence: localStorage

    - name: localeStore
      path: src/lib/stores/locale.ts
      exports: [localeStore, locale, localeInfo]
      persistence: localStorage

    - name: onboardingStore
      path: src/lib/stores/onboarding.ts
      exports: [onboardingStore, currentStep, onboardingCompleted]
      persistence: localStorage

  factory:
    - name: createCRUDStore
      path: src/lib/stores/factory/createCRUDStore.ts
      exports: [createCRUDStore, createDerivedStores]
      description: Generic factory for CRUD stores with Tauri IPC

# =============================================================================
# SERVICES (frontend service layer)
# =============================================================================
services:
  barrel:
    - name: index
      path: src/lib/services/index.ts
      description: Service layer barrel re-exports for agent page

  ipc_services:
    - name: blockService
      path: src/lib/services/block.service.ts
      description: Load persisted execution blocks from the backend

    - name: messageService
      path: src/lib/services/message.service.ts
      description: Message-related Tauri IPC calls (save user/assistant messages)

    - name: subAgentExecutionService
      path: src/lib/services/sub-agent-execution.service.ts
      description: Sub-agent execution data loading via IPC

    - name: workflowService
      path: src/lib/services/workflow.service.ts
      description: Workflow-related Tauri IPC calls (create, execute, restore)

  orchestration:
    - name: workflowExecutorService
      path: src/lib/services/workflowExecutor.service.ts
      description: Orchestrates message sending and streaming (save, stream, execute, tokens, persist)

  storage:
    - name: localStorageService
      path: src/lib/services/localStorage.service.ts
      description: Type-safe localStorage access for sidebar state, workflow selection, and status filter

# =============================================================================
# TAURI COMMANDS (by module)
# =============================================================================
commands:
  agent:
    file: src-tauri/src/commands/agent.rs
    commands:
      - { name: list_agents, returns: "Vec<AgentSummary>" }
      - { name: get_agent_config, params: [agent_id], returns: AgentConfig }
      - { name: create_agent, params: [config: AgentConfigCreate], returns: String }
      - { name: update_agent, params: [agent_id, config: AgentConfigUpdate], returns: AgentConfig }
      - { name: delete_agent, params: [agent_id], returns: "()" }

  file_manager:
    file: src-tauri/src/commands/file_manager.rs
    commands:
      - { name: validate_agent_folder, params: [path], returns: String }
      - { name: list_trash, params: [folder_path], returns: "Vec<TrashEntry>" }
      - { name: restore_from_trash_cmd, params: [trash_path, folder_path], returns: String }

  skill:
    file: src-tauri/src/commands/skill.rs
    commands:
      - { name: list_skills, returns: "Vec<SkillSummary>" }
      - { name: get_skill, params: [skill_id], returns: Skill }
      - { name: create_skill, params: [config: SkillCreate], returns: String }
      - { name: update_skill, params: [skill_id, config: SkillUpdate], returns: Skill }
      - { name: delete_skill, params: [skill_id], returns: "()" }
      - { name: toggle_skill_enabled, params: [skill_id, enabled], returns: Skill }

  workflow:
    file: src-tauri/src/commands/workflow.rs
    commands:
      - { name: create_workflow, params: [name, agent_id], returns: String }
      - { name: load_workflows, returns: "Vec<Workflow>" }
      - { name: rename_workflow, params: [workflow_id, name], returns: Workflow }
      - { name: delete_workflow, params: [workflow_id], returns: "()" }
      - { name: delete_workflows_batch, params: [workflow_ids], returns: BatchDeleteResult }
      - { name: load_workflow_full_state, params: [workflow_id], returns: WorkflowFullState }
      - { name: move_workflow_to_folder, params: [workflow_id, "folder_id?"], returns: Workflow }
      - { name: move_workflows_to_folder, params: [workflow_ids, "folder_id?"], returns: u64 }
      - { name: toggle_workflow_pinned, params: [workflow_id], returns: Workflow }

  workflow_folder:
    file: src-tauri/src/commands/workflow_folder.rs
    commands:
      - { name: create_workflow_folder, params: [name, color], returns: WorkflowFolder }
      - { name: list_workflow_folders, returns: "Vec<WorkflowFolder>" }
      - { name: rename_workflow_folder, params: [folder_id, name], returns: WorkflowFolder }
      - { name: update_folder_color, params: [folder_id, color], returns: WorkflowFolder }
      - { name: delete_workflow_folder, params: [folder_id], returns: "()" }
      - { name: reorder_workflow_folders, params: [folder_ids], returns: "()" }

  streaming:
    file: src-tauri/src/commands/streaming.rs
    commands:
      - { name: execute_workflow_streaming, params: [window, workflow_id, message, agent_id, locale], returns: WorkflowResult }
      - { name: cancel_workflow_streaming, params: [workflow_id], returns: "()" }

  tool_execution:
    file: src-tauri/src/commands/tool_execution.rs
    commands:
      - { name: save_tool_execution, params: [workflow_id, message_id, agent_id, tool_type, tool_name, server_name, input_params, output_result, success, error_message, duration_ms, iteration], returns: String }
      - { name: load_workflow_tool_executions, params: [workflow_id], returns: "Vec<ToolExecution>" }
      - { name: load_message_tool_executions, params: [message_id], returns: "Vec<ToolExecution>" }
      - { name: get_tool_execution, params: [execution_id], returns: ToolExecution }
      - { name: delete_tool_execution, params: [execution_id], returns: "()" }
      - { name: clear_workflow_tool_executions, params: [workflow_id], returns: u64 }

  memory:
