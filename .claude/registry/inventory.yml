# =============================================================================
# QUICK LOOKUP
# =============================================================================
quick_lookup:
  # Common searches
  "need a button": Button in src/lib/components/ui/Button.svelte
  "need a modal": Modal in src/lib/components/ui/Modal.svelte
  "need a form input": Input, Select, Textarea in src/lib/components/ui/
  "need loading state": Spinner, Skeleton in src/lib/components/ui/
  "need to call backend": Check stores (invokes field) or add to existing command module
  "need new type": Check types_typescript and types_rust - add to both if new
  "need store with CRUD": Use createCRUDStore factory
