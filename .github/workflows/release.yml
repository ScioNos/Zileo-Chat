name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# contents:write is scoped to the build job (which uploads release artifacts
# via tauri-action). Keeping the workflow-wide default permissions read-only
# limits blast radius if a third-party action is ever compromised.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-targets: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        # dtolnay/rust-toolchain has no tagged releases — pin to the current
        # commit on `stable`. Bump deliberately when refreshing the toolchain.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-08
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7
        with:
          workspaces: './src-tauri -> target'
          shared-key: release-${{ matrix.target }}
          save-if: ${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/') }}
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf clang llvm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@bef7b83ae45d5399cc8e382d06e8a13f1fd1cb7e # v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zileo Chat ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          args: '--target ${{ matrix.target }}'
