name: Validate

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Test
        run: npm run test

  backend-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

  backend-clippy:
    needs: backend-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Backend
        uses: ./.github/actions/setup-rust-backend
        with:
          rust-components: clippy
          cache-key: clippy

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  backend-test:
    needs: backend-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Backend
        uses: ./.github/actions/setup-rust-backend
        with:
          rust-components: ''
          cache-key: test

      - name: Test
        working-directory: src-tauri
        run: cargo test

  backend:
    needs: [backend-fmt, backend-clippy, backend-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check backend results
        run: |
          if [ "${{ needs.backend-fmt.result }}" != "success" ] || \
             [ "${{ needs.backend-clippy.result }}" != "success" ] || \
             [ "${{ needs.backend-test.result }}" != "success" ]; then
            echo "One or more backend jobs failed"
            exit 1
          fi
