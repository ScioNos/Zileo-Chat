name: Validate

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Test
        run: npm run test

      # npm audit: fail only on production-only high/critical vulnerabilities.
      # Dev-only advisories are noise on this branch (mostly typescript-eslint,
      # vitest plugins, ...) and we don't ship them.
      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  backend-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup Rust
        # dtolnay/rust-toolchain has no tagged releases — pin to the current
        # commit on `stable`. Bump deliberately when refreshing the toolchain.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-08
        with:
          components: rustfmt

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

  backend-clippy:
    needs: backend-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup Rust Backend
        uses: ./.github/actions/setup-rust-backend
        with:
          rust-components: clippy
          cache-key: clippy

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  backend-test:
    needs: backend-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup Rust Backend
        uses: ./.github/actions/setup-rust-backend
        with:
          rust-components: ''
          cache-key: test

      - name: Test
        working-directory: src-tauri
        run: cargo test

  backend-audit:
    needs: backend-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Setup Rust Backend
        uses: ./.github/actions/setup-rust-backend
        with:
          rust-components: ''
          cache-key: audit
      # cargo-audit prints advisories from RustSec/advisory-db.
      # Informational for now: it runs but does not fail the build, so
      # transient advisories on transitive deps don't block PRs. Promote to
      # failing once the advisory baseline is clean.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        working-directory: src-tauri
        run: cargo audit
        continue-on-error: true

  backend:
    needs: [backend-fmt, backend-clippy, backend-test, backend-audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check backend results
        # backend-audit is intentionally not gating: it runs `continue-on-error: true`
        # so the aggregator only fails when fmt/clippy/test fail. The audit
        # output is visible in the run logs as advisory information.
        run: |
          if [ "${{ needs.backend-fmt.result }}" != "success" ] || \
             [ "${{ needs.backend-clippy.result }}" != "success" ] || \
             [ "${{ needs.backend-test.result }}" != "success" ]; then
            echo "One or more backend jobs failed"
            exit 1
          fi
