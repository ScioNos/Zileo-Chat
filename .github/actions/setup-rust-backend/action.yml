name: 'Setup Rust Backend'
description: 'Install Rust toolchain, system deps, and configure cache for backend CI'

inputs:
  rust-components:
    description: 'Rust components to install (comma-separated)'
    default: ''
  cache-key:
    description: 'Cache key suffix for swatinem/rust-cache'
    required: true
  save-cache:
    description: 'Whether to save the cache after the job'
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Rust
      # dtolnay/rust-toolchain has no tagged releases — pin to the current
      # commit on `stable`. Bump deliberately when refreshing the toolchain.
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-08
      with:
        components: ${{ inputs.rust-components }}

    - name: Rust cache
      uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: './src-tauri -> target'
        shared-key: validate-${{ inputs.cache-key }}
        save-if: ${{ inputs.save-cache }}
        cache-on-failure: true

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev clang llvm

    - name: Create frontend dist placeholder
      shell: bash
      run: mkdir -p build
